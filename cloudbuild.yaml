steps:
  # Run tests
  - name: 'python:3.10-slim'
    entrypoint: /bin/sh
    args:
      - -c
      - |
        pip install -r requirements.txt
        PYTHONPATH=. pytest

  # Build and push the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/chefs-comp-app/app:$COMMIT_SHA', '.']
  
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/chefs-comp-app/app:$COMMIT_SHA']

  # Create a Cloud Deploy release
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      [
        'deploy', 'releases', 'create', 'release-$SHORT_SHA',
        '--delivery-pipeline', 'chefs-companion',
        '--region', 'us-central1',
        '--annotations', 'commit_sha=$COMMIT_SHA',
        '--images', 'IMAGE_PLACEHOLDER=us-central1-docker.pkg.dev/$PROJECT_ID/chefs-comp-app/app:$COMMIT_SHA'
      ]

options:
  logging: CLOUD_LOGGING_ONLY
