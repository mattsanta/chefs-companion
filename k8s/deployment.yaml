apiVersion: apps/v1
kind: Deployment
metadata:
  name: chefs-companion
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chefs-companion
  template:
    metadata:
      labels:
        app: chefs-companion
    spec:
      containers:
      - name: app
        image: IMAGE_PLACEHOLDER
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
